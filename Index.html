<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💝 शुभकामना भेजक</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #ff4500, #ff6347, #ff8c00, #dc143c, #b22222);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 165, 0, 0.95);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 140, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff8c00, #ff7f50, #ff6347, #ff4500, #ffa500);
            z-index: -1;
            border-radius: 25px;
        }

        .header {
            margin-bottom: 25px;
        }

        .image-container {
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            position: relative;
            display: flex;
            justify-content: center;
        }

        .profile-image {
            width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 15px;
            transition: transform 0.3s ease;
            border: 4px solid rgba(255, 255, 255, 0.8);
        }

        .image-container:hover .profile-image {
            transform: scale(1.05);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 22px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            background: linear-gradient(45deg, #8b4513, #d2691e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }

        .subtitle {
            color: #333;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
            font-weight: 600;
        }

        .quick-templates {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .template-btn {
            padding: 8px 14px;
            background: linear-gradient(45deg, #8b4513, #cd853f);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(139, 69, 19, 0.3);
            font-weight: bold;
        }

        .template-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.5);
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .emoji {
            margin-right: 5px;
            font-size: 16px;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #d2691e;
            border-radius: 15px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
            position: relative;
        }

        .input-field:focus {
            outline: none;
            border-color: #8b4513;
            box-shadow: 0 0 15px rgba(139, 69, 19, 0.3);
            transform: translateY(-2px);
        }
        .input-field[readonly] {
            background-color: rgba(220, 220, 220, 0.7); /* Slightly different background for readonly */
            cursor: text; /* Allow text selection */
        }


        .textarea-field {
            height: 100px; /* Adjusted height slightly */
            resize: vertical;
            font-family: inherit;
        }

        .char-counter {
            text-align: right;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            font-weight: bold;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
        }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }

        .btn-copy-url { /* Renamed class for clarity */
            background: linear-gradient(135deg, #8b4513, #cd853f);
            color: white;
            box-shadow: 0 5px 15px rgba(139, 69, 19, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-icon {
            margin-right: 6px;
            font-size: 16px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            font-weight: bold;
        }

        .toast.show {
            transform: translateX(0);
        }

        .floating-emojis {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-emoji {
            position: absolute;
            font-size: 20px;
            animation: float 6s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 5px;
                border-radius: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .profile-image {
                width: 180px;
                height: 110px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .quick-templates {
                gap: 5px;
            }

            .template-btn {
                font-size: 11px;
                padding: 6px 10px;
            }
            .textarea-field {
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-emojis" id="floatingEmojis"></div>

    <div class="container">
        <div class="header">
            <div class="image-container">
                <img src="maraj.jpg" alt="छत्रपति शिवाजी महाराज" class="profile-image" id="profileImage">
            </div>
            <h1>🙏 छत्रपति शिवाजी महाराज</h1>
            <p class="subtitle">वीर शिवाजी के आदर्शों को अपनाएं ⚔️</p>
        </div>

      

        <div class="input-group">
            <label class="input-label">
                <span class="emoji">👤</span>
                आपका नाम:
            </label>
            <input type="text" id="senderName" class="input-field" placeholder="अपना नाम यहाँ लिखें..." maxlength="50">
        </div>

        <div class="input-group">
            <label class="input-label">
                <span class="emoji">💌</span>
                आपकी शुभकामनाएं:
            </label>
            <textarea id="wishMessage" class="input-field textarea-field" placeholder="अपनी प्यारी शुभकामनाएं यहाँ लिखें..." maxlength="500">🚩 हर हर महादेव! 🙏🌟 छत्रपति शिवाजी महाराज के आदर्शों की तरह⚔️ आपका जीवन भी वीरता और न्याय से भरा हो!🏰 स्वराज्य की भावना आपके दिल में बनी रहे!💫 शिवरायांच्या मार्गावर चालत राहा!जय भवानी! जय शिवाजी! 🚩</textarea>
            <div class="char-counter" id="charCounter">0/500</div>
        </div>

        <div class="input-group">
            <label class="input-label" for="pageShareURL">
                <span class="emoji">🔗</span>
                पेज URL शेयर करें:
            </label>
            <input type="text" id="pageShareURL" class="input-field" readonly>
        </div>

        <div class="action-buttons">
            <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">
                <span class="btn-icon">📱</span>
                WhatsApp भेजें
            </button>
            <button class="btn btn-copy-url" onclick="copyPageURL()"> <span class="btn-icon">📋</span>
                URL कॉपी करें </button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        

        // Load template
        function loadTemplate(type) {
            document.getElementById('wishMessage').value = templates[type];
            updateCharCounter();
            showToast(`${type} संदेश लोड हो गया! 📝`);
            createFloatingEmojis();
        }

        // Update character counter
        function updateCharCounter() {
            const message = document.getElementById('wishMessage').value;
            const counter = document.getElementById('charCounter');
            counter.textContent = `${message.length}/500`;

            if (message.length > 450) {
                counter.style.color = '#dc143c';
            } else if (message.length > 350) {
                counter.style.color = '#ff8c00';
            } else {
                counter.style.color = '#666';
            }
        }
        
        // Populate Page URL field
        function populatePageURL() {
            const pageURLField = document.getElementById('pageShareURL');
            if (pageURLField) {
                pageURLField.value = window.location.href;
            }
        }

        // Send to WhatsApp
        function sendToWhatsApp() {
            const senderName = document.getElementById('senderName').value.trim();
            const wishMessage = document.getElementById('wishMessage').value.trim();
            const pageURL = document.getElementById('pageShareURL').value; // Get the page URL

            if (!wishMessage) {
                showToast('कृपया अपनी शुभकामनाएं लिखें! 💌', 'error');
                return;
            }

            let fullMessage = wishMessage;
            if (senderName) {
                fullMessage += `\n\n- ${senderName}`;
            }
            
            fullMessage += `\n\nइस शुभकामना को यहाँ देखें:\n${pageURL}`; // Append the page URL

            const encodedMessage = encodeURIComponent(fullMessage);
            const whatsappURL = `https://wa.me/?text=${encodedMessage}`;

            window.open(whatsappURL, '_blank');
            showToast('WhatsApp खुल रहा है! 📱');
            createFloatingEmojis();
        }

        // Copy Page URL (replaces old copyMessage)
        function copyPageURL() {
            const pageURLToCopy = document.getElementById('pageShareURL').value;

            if (!pageURLToCopy) {
                showToast('कोई URL नहीं है copy करने के लिए! 🔗', 'error');
                return;
            }

            navigator.clipboard.writeText(pageURLToCopy).then(() => {
                showToast('पेज URL कॉपी हो गया! 📋');
                createFloatingEmojis();
            }).catch(() => {
                showToast('URL कॉपी नहीं हो सका! 😞', 'error');
            });
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = type === 'error' ? '#dc143c' : '#25D366';
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Create floating emojis
        function createFloatingEmojis() {
            const emojis = ['🚩', '⚔️', '🏰', '👑', '🙏', '✨', '💫', '🌟'];
            const container = document.getElementById('floatingEmojis');

            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.left = Math.random() * 100 + '%';
                    emoji.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(emoji);

                    setTimeout(() => {
                        if (emoji.parentNode) {
                            emoji.parentNode.removeChild(emoji);
                        }
                    }, 6000);
                }, i * 300);
            }
        }

        // Event listeners
        document.getElementById('wishMessage').addEventListener('input', updateCharCounter);

        // Initialize
        populatePageURL(); // Call this on load to fill the URL field
        updateCharCounter();


        // Add keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendToWhatsApp();
            }
        });
    </script>
</body>
</html>
